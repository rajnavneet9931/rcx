server {
    listen 80;
    server_name jeecomit.sbs www.jeecomit.sbs;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jeecomit.sbs www.jeecomit.sbs;

    ssl_certificate /etc/letsencrypt/live/jeecomit.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jeecomit.sbs/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # frontend source unchanged; Nginx rewrites API URL while serving JS
    sub_filter_once off;
    sub_filter_types application/javascript text/javascript;
    sub_filter 'http://localhost:5000/api' '/api';

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        try_files /Admin.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
